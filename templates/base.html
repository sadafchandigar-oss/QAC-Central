<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAC Central — {% block title %}{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;display:flex;min-height:100vh}
a{text-decoration:none;color:inherit}
.sidebar{width:220px;background:#0d1b3e;min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-logo .brand{font-size:17px;font-weight:700;color:#fff}
.sidebar-logo .sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px}
.nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13.5px;color:rgba(255,255,255,0.6);cursor:pointer;transition:background 0.15s}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{background:rgba(56,139,255,0.18);color:#5ba3ff;border-right:3px solid #3b82f6}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar h1{font-size:16px;font-weight:600;color:#1a1a2e;flex:1}
.search-wrap{display:flex;align-items:center;gap:8px;background:#f0f2f5;border:1px solid #e2e8f0;border-radius:8px;padding:7px 12px;width:280px}
.search-wrap input{border:none;background:transparent;font-size:13px;outline:none;width:100%;color:#1a1a2e}
.content{padding:24px;flex:1}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity 0.15s}
.btn:hover{opacity:0.85}
.btn-primary{background:#1d4ed8;color:#fff}
.btn-success{background:#059669;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-sm{padding:5px 11px;font-size:12px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px 18px}
.stat-num{font-size:28px;font-weight:700;color:#1d4ed8}
.stat-lbl{font-size:12px;color:#6b7280;margin-top:3px}
.mills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.mill-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s}
.mill-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:#93c5fd}
.mill-name{font-size:14px;font-weight:600;color:#1a1a2e}
.mill-meta{font-size:12px;color:#6b7280;margin-top:3px}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.badge-weaving{background:#dbeafe;color:#1d4ed8}
.badge-spinning{background:#d1fae5;color:#065f46}
.badge-oe{background:#fef3c7;color:#92400e}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-progress{background:#dbeafe;color:#1d4ed8}
.badge-completed{background:#d1fae5;color:#065f46}
.badge-cancelled{background:#fee2e2;color:#991b1b}
.mill-footer{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11px;color:#6b7280;background:#f3f4f6;padding:3px 8px;border-radius:6px}
.file-table{width:100%;border-collapse:collapse;font-size:13px}
.file-table th{text-align:left;padding:8px 10px;background:#f8fafc;color:#6b7280;font-weight:500;border-bottom:1px solid #e2e8f0;font-size:12px}
.file-table td{padding:9px 10px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
.file-table tr:last-child td{border-bottom:none}
.file-table tr:hover td{background:#f8fafc}
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;display:block}
.form-control{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;color:#1a1a2e;background:#fff;outline:none}
.form-control:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;margin-top:5px;flex-shrink:0}
.act-text{font-size:13px;color:#374151}
.act-meta{font-size:11px;color:#9ca3af;margin-top:2px}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:24px;text-align:center;color:#6b7280;font-size:13px;cursor:pointer;transition:border-color 0.15s}
.upload-zone:hover{border-color:#3b82f6;color:#3b82f6}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">⚙ QAC Central</div>
    <div class="sub">Qadri Air Control & Engineering</div>
  </div>
  <nav class="nav">
    <a href="/" class="nav-item {% if request.endpoint=='dashboard' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="/mills" class="nav-item {% if request.endpoint in ['mills_list','mill_detail','add_mill','edit_mill'] %}active{% endif %}">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21V12h6v9"/></svg>
      Mills
    </a>
    <a href="/mills?dept=Technical" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Proposals
    </a>
    <a href="/mills?dept=Drawings" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Drawings
    </a>
    <a href="/mills?dept=Production" class="nav-item">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Production
    </a>
    <a href="/activity" class="nav-item {% if request.endpoint=='activity_log' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Activity log
    </a>
    <a href="/search" class="nav-item {% if request.endpoint=='search' %}active{% endif %}">
      <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </a>
  </nav>
  <div style="padding:14px 18px;border-top:1px solid rgba(255,255,255,0.08)">
    <div style="font-size:11px;color:rgba(255,255,255,0.3)">QAC Central v1.0</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h1>{% block page_title %}{% endblock %}</h1>
    <form action="/search" method="get" style="display:flex">
      <div class="search-wrap">
        <svg width="15" height="15" fill="none" stroke="#9ca3af" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input name="q" placeholder="Mill name search karein..." value="{{ request.args.get('q','') }}">
      </div>
    </form>
    {% block topbar_actions %}{% endblock %}
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
